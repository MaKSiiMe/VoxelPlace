name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  test-backend:
    name: Tests backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: apps/socket-server
        run: npm install

      - name: Run backend tests
        working-directory: apps/socket-server
        run: npm test
        env:
          BCRYPT_ROUNDS: 1

  test-frontend:
    name: Tests frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install web dependencies
        run: npm install --workspace=apps/web

      - name: Run frontend tests
        run: npm test --workspace=apps/web

  deploy:
    name: Deploy
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy app + plugin
        uses: appleboy/ssh-action@v1
        with:
          host: 100.124.153.20
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: RCON_PASSWORD
          script: |
            cd /opt/voxelplace
            git fetch origin
            git reset --hard origin/main
            docker compose build voxelplace-api voxelplace-web
            docker compose up -d
            docker image prune -f
            if git diff HEAD@{1} HEAD --name-only | grep -q '^apps/game-bridges/minecraft/'; then
              mvn -f apps/game-bridges/minecraft/pom.xml clean package -q
              sudo cp apps/game-bridges/minecraft/target/VoxelPlace.jar \
                /var/lib/docker/volumes/minecraft-server_mc_data/_data/plugins/VoxelPlace.jar
              docker restart minecraft-paper
              echo "[deploy] Plugin Minecraft mis à jour."
            else
              echo "[deploy] Aucun changement Minecraft, redémarrage ignoré."
            fi
        env:
          RCON_PASSWORD: ${{ secrets.RCON_PASSWORD }}
