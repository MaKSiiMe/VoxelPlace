name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  test-backend:
    name: Tests backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: apps/socket-server
        run: npm install

      - name: Run backend tests
        working-directory: apps/socket-server
        run: npm test
        env:
          BCRYPT_ROUNDS: 1

  test-frontend:
    name: Tests frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install web dependencies
        run: npm install --workspace=apps/web

      - name: Run frontend tests
        run: npm test --workspace=apps/web

  build-minecraft:
    name: Build Minecraft plugin
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        working-directory: apps/game-bridges/minecraft
        run: mvn clean package -q

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: voxelplace-plugin
          path: apps/game-bridges/minecraft/target/VoxelPlace.jar
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy
    needs: [test-backend, test-frontend, build-minecraft]
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Download Minecraft plugin JAR
        uses: actions/download-artifact@v4
        with:
          name: voxelplace-plugin
          path: plugin/

      - name: Encode JAR as base64
        id: encode
        run: |
          echo "jar_b64=$(base64 -w 0 plugin/VoxelPlace.jar)" >> $GITHUB_OUTPUT

      - name: Deploy app + plugin
        uses: appleboy/ssh-action@v1
        with:
          host: 100.124.153.20
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: JAR_B64,RCON_PASSWORD
          script: |
            echo "$JAR_B64" | base64 -d > /var/lib/docker/volumes/minecraft-server_mc_data/_data/plugins/VoxelPlace.jar
            cd /opt/voxelplace
            git fetch origin
            git reset --hard origin/main
            docker compose up --build -d
            docker image prune -f
            docker exec minecraft-paper rcon-cli --password "$RCON_PASSWORD" reload confirm
        env:
          JAR_B64: ${{ steps.encode.outputs.jar_b64 }}
          RCON_PASSWORD: ${{ secrets.RCON_PASSWORD }}
