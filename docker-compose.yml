services:

  voxelplace-nginx:
    image: nginx:alpine
    container_name: voxelplace-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - voxelplace-web
      - voxelplace-api

  voxelplace-db:
    image: postgres:16-alpine
    container_name: voxelplace-db
    restart: always
    environment:
      POSTGRES_DB:       voxelplace
      POSTGRES_USER:     voxelplace
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/socket-server/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voxelplace"]
      interval: 5s
      timeout: 5s
      retries: 10

  voxelplace-api:
    build:
      context: ./apps/socket-server
      dockerfile: Dockerfile
    container_name: voxelplace-api
    restart: always
    environment:
      PORT:            "3001"
      REDIS_URL:       "redis://voxelplace-redis:6379"
      DATABASE_URL:    "postgresql://voxelplace:${POSTGRES_PASSWORD}@voxelplace-db:5432/voxelplace"
      ADMIN_PASSWORD:  "${ADMIN_PASSWORD}"
      JWT_SECRET:      "${JWT_SECRET}"
      TEST_USERNAMES:  "${TEST_USERNAMES:-}"
    depends_on:
      voxelplace-db:
        condition: service_healthy

  voxelplace-web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost}"
    container_name: voxelplace-web
    restart: always
    environment:
      PORT: "3000"
    depends_on:
      - voxelplace-api

  voxelplace-redis:
    image: redis:latest
    container_name: voxelplace-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --appendonly yes

volumes:
  postgres_data:
  redis_data:
