services:

  voxelplace-db:
    image: postgres:16-alpine
    container_name: voxelplace-db
    restart: always
    environment:
      POSTGRES_DB:       voxelplace
      POSTGRES_USER:     voxelplace
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/socket-server/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voxelplace"]
      interval: 5s
      timeout: 5s
      retries: 10

  voxelplace-api:
    build:
      context: ./apps/socket-server
      dockerfile: Dockerfile
    container_name: voxelplace-api
    restart: always
    ports:
      - "3001:3001"
    environment:
      PORT:            "3001"
      REDIS_URL:       "redis://100.124.153.20:6379"
      DATABASE_URL:    "postgresql://voxelplace:${POSTGRES_PASSWORD}@voxelplace-db:5432/voxelplace"
      ADMIN_PASSWORD:  "${ADMIN_PASSWORD}"
      JWT_SECRET:      "${JWT_SECRET}"
      TEST_USERNAMES:  "${TEST_USERNAMES:-}"
    depends_on:
      voxelplace-db:
        condition: service_healthy

  voxelplace-web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: voxelplace-web
    restart: always
    ports:
      - "80:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://voxelplace-api:3001"
      PORT: "3000"
    depends_on:
      - voxelplace-api

volumes:
  postgres_data:
